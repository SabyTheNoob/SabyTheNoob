<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found · SabyTheNoob</title>
<link rel="icon" type="image/png" href="/assets/sabythenoob.png">
<link rel="apple-touch-icon" href="/assets/sabythenoob.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #06060c;
  --bg2:     #0f0f1e;
  --bg3:     #161630;
  --border:  rgba(110,90,255,0.12);
  --purple:  #6c4ff6;
  --purple2: #9b7aff;
  --orange:  #ff6a28;
  --orange2: #ffa265;
  --text:    #f0ecfa;
  --muted:   #6e6a8a;
  --muted2:  #9994b8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
  pointer-events: none; z-index: 999;
}

/* Glow blobs */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
  pointer-events: none;
  z-index: 0;
}
.blob-1 { width: 600px; height: 600px; background: var(--purple); top: -200px; left: -150px; }
.blob-2 { width: 500px; height: 500px; background: var(--orange); bottom: -150px; right: -100px; }

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px; height: 62px;
  background: rgba(5,5,10,0.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo {
  text-decoration: none;
  display: inline-flex; align-items: center; gap: 8px;
}
.nav-logo img { height: 30px; width: auto; display: block; }
.brand-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.03em;
  line-height: 1;
  display: inline-flex; align-items: center;
  color: var(--text);
  white-space: nowrap;
}
.brand-noob {
  background: #5BAD78;
  color: #fff;
  padding: 0 6px;
  border-radius: 4px;
  margin-left: 1px;
  display: inline-flex; align-items: center;
  height: 1.35em;
}
.nav-back {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; font-size: 0.9rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted2); text-decoration: none;
  border: 1px solid rgba(110,90,255,0.25);
  padding: 6px 18px; border-radius: 6px;
  transition: color 0.2s, border-color 0.2s;
}
.nav-back:hover { color: var(--text); border-color: var(--purple); }

/* ── MAIN ── */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 100px 24px 60px;
  position: relative; z-index: 1;
}

/* Glitching 404 */
.error-code {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(120px, 22vw, 220px);
  line-height: 0.9;
  letter-spacing: 0.04em;
  background: linear-gradient(135deg, var(--purple2), var(--orange2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  position: relative;
  animation: flicker 4s infinite;
  user-select: none;
}
@keyframes flicker {
  0%,94%,96%,98%,100% { opacity: 1; transform: none; }
  95%  { opacity: 0.7; transform: skewX(-3deg) translateX(2px); }
  97%  { opacity: 0.9; transform: skewX(2deg) translateX(-1px); }
  99%  { opacity: 0.6; transform: skewX(-1deg); }
}

/* Ghost pixel art decoration */
.ghost {
  font-size: 56px;
  margin: 8px 0 20px;
  animation: float 3s ease-in-out infinite;
  display: block;
  filter: drop-shadow(0 0 16px rgba(108,79,246,0.6));
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}

.error-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: clamp(1.5rem, 4vw, 2.2rem);
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 12px;
  color: var(--text);
}
.error-sub {
  font-size: 1rem;
  color: var(--muted2);
  max-width: 440px;
  line-height: 1.7;
  margin-bottom: 40px;
}
.error-sub span { color: var(--orange2); font-weight: 500; }

/* Action buttons */
.btn-row {
  display: flex; align-items: center; justify-content: center;
  gap: 14px; flex-wrap: wrap;
}
.btn-home {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; text-decoration: none;
  padding: 12px 32px; border-radius: 8px;
  background: linear-gradient(135deg, var(--purple), var(--orange));
  color: #fff;
  border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(108,79,246,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,79,246,0.5); }
.btn-scrum {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; text-decoration: none;
  padding: 12px 28px; border-radius: 8px;
  border: 1px solid rgba(255,106,40,0.4);
  color: var(--orange2);
  transition: color 0.2s, border-color 0.2s, background 0.2s;
}
.btn-scrum:hover { background: rgba(255,106,40,0.1); border-color: var(--orange); color: var(--text); }
.btn-back {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1rem; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; text-decoration: none;
  padding: 12px 28px; border-radius: 8px;
  border: 1px solid rgba(110,90,255,0.3);
  color: var(--muted2);
  transition: color 0.2s, border-color 0.2s;
}
.btn-back:hover { color: var(--text); border-color: var(--purple); }

/* Quick links */
.quick-links {
  margin-top: 56px;
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap; justify-content: center;
}
.quick-label {
  font-size: 0.78rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-right: 4px;
}
.quick-link {
  font-size: 0.82rem; font-family: 'Rajdhani', sans-serif;
  font-weight: 600; letter-spacing: 0.05em;
  color: var(--purple2); text-decoration: none;
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid rgba(110,90,255,0.2);
  transition: background 0.2s, color 0.2s;
}
.quick-link:hover { background: rgba(110,90,255,0.12); color: var(--text); }

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 20px;
  font-size: 0.78rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  position: relative; z-index: 1;
}

/* ── RESPONSIVE ── */
@media (max-width: 480px) {
  nav { padding: 0 20px; }
  .nav-back { display: none; }
  .btn-row { flex-direction: column; width: 100%; }
  .btn-home, .btn-scrum, .btn-back { width: 100%; text-align: center; }
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="/">
    <img src="/assets/sabythenoob.png" alt="SabyTheNoob">
    <span class="brand-name">SabyThe<span class="brand-noob">Noob</span></span>
  </a>
  <a class="nav-back" href="/">← Home</a>
</nav>

<!-- MAIN -->
<main>
  <div class="error-code">404</div>
  <span class="ghost" id="ghost-emoji">👻</span>
  <div class="error-title">Page Not Found</div>
  <p class="error-sub" id="meme-text"></p>

  <div class="btn-row">
    <a class="btn-home" href="/">▶ &nbsp;Back to Home</a>
    <a class="btn-scrum" href="/scrumboard">🎮 &nbsp;Scrum Board</a>
    <a class="btn-back" href="javascript:history.back()">← Go Back</a>
  </div>

  <div class="quick-links">
    <span class="quick-label">Quick links</span>
    <a class="quick-link" href="/#apps">Games</a>
    <a class="quick-link" href="/#videos">Videos</a>
    <a class="quick-link" href="/scrumboard">Scrum Board</a>
    <a class="quick-link" href="/privacy-policy">Privacy</a>
  </div>
</main>

<!-- FOOTER -->
<footer>
  SabyTheNoob &copy; <span id="yr"></span> · Indie Game &amp; App Studio
</footer>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  const memes = [
    { text: 'Bro typed a URL and speedran to a 404. Skill issue. 💀', ghost: '💀' },
    { text: 'This page left the chat. 😂 It said "I\'m not in the mood today."', ghost: '🚪' },
    { text: 'GTA loading screen has more content than this URL. 🎮', ghost: '👾' },
    { text: 'Sir, this is a 404. The page you wanted doesn\'t exist in any parallel universe. 🌌', ghost: '🌌' },
    { text: 'You found the void. Congrats. Nobody else wanted this page either. 🕳️', ghost: '🕳️' },
    { text: 'This URL hit different... ly wrong. 💅', ghost: '✨' },
    { text: 'Error 404: Page is on vacation and forgot to tell anyone. ✈️', ghost: '🏖️' },
    { text: 'The page doesn\'t exist. It never existed. We don\'t talk about it. 🤫', ghost: '🤫' },
    { text: 'Imagine typing a URL this wrong and not being embarrassed. Couldn\'t be me. 😭', ghost: '😭' },
    { text: 'POV: You followed a link from 2019. It did not survive. ☠️', ghost: '☠️' },
    { text: 'This page got deleted faster than your browser history. 💨', ghost: '🙈' },
    { text: 'Nahi milega bhai. Gayi page, wapas nahi aayegi. 🙏', ghost: '🫡' },
    { text: 'You played yourself. This URL doesn\'t exist and never did. 🤡', ghost: '🤡' },
    { text: 'Our servers looked everywhere. Even checked under the sofa. Nothing. 🛋️', ghost: '🔦' },
    { text: 'Page.exe has stopped working. Try turning the internet off and on. 🔌', ghost: '💻' },
  ];

  const pick = memes[Math.floor(Math.random() * memes.length)];
  document.getElementById('meme-text').innerHTML = pick.text;
  document.getElementById('ghost-emoji').textContent = pick.ghost;
</script>
</body>
</html>
